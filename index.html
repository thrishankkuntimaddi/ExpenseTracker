<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Favicon — all browsers ── -->
    <!-- SVG favicon (modern browsers: Chrome, Firefox, Edge) -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg?v=3" sizes="any" />
    <!-- PNG fallback (Safari, older browsers) -->
    <link rel="icon" type="image/png" href="%BASE_URL%icon-512.png?v=3" sizes="512x512" />
    <!-- Shortcut icon for IE/legacy -->
    <link rel="shortcut icon" href="%BASE_URL%favicon.svg?v=3" />

    <!-- ── Apple / PWA icons ── -->
    <link rel="apple-touch-icon" sizes="512x512" href="%BASE_URL%icon-512.png?v=3" />
    <link rel="manifest" href="%BASE_URL%manifest.json?v=3" />

    <!-- ── Viewport & Theme ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6366F1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Expense Tracker" />

    <!-- ── SEO ── -->
    <meta name="description" content="Personal Expense Tracker – smart month-based financial tracking with carry-forward balance, wastage awareness, income management, and visual analytics." />
    <meta name="keywords" content="expense tracker, personal finance, budget, savings, income" />

    <title>Expense Tracker – Personal Finance</title>

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body style="background:#F5F3FF;margin:0">
    <!-- Theme applied before React boots — prevents FOUC -->
    <script>
      (function() {
        try {
          var s = localStorage.getItem('expenseTrackerState');
          var parsed = s && JSON.parse(s);
          var theme = parsed && parsed.settings && parsed.settings.theme;
          if (theme) document.documentElement.setAttribute('data-theme', theme);
        } catch(e) {}
        // Set body colour to match current theme before React mounts
        var t = document.documentElement.getAttribute('data-theme');
        document.body.style.backgroundColor = t === 'monoflow' ? '#0c0c0c' : '#F8FAFC';
      })();
    </script>
    <div id="root">
      <!-- Preloader: shown before React JS bundle executes -->
      <div id="app-preloader" style="
        height:100dvh; display:flex; flex-direction:column;
        align-items:center; justify-content:center; gap:16px;
      ">
        <div style="
          width:52px; height:52px; border-radius:14px;
          background:#6366F1; display:flex;
          align-items:center; justify-content:center;
          box-shadow:0 8px 24px rgba(99,102,241,0.35);
        ">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <div style="
          width:36px; height:4px; border-radius:99px;
          background:rgba(99,102,241,0.15); overflow:hidden;
        ">
          <div style="
            width:60%; height:100%; border-radius:99px;
            background:#6366F1;
            animation:preloaderSlide 1.2s ease-in-out infinite alternate;
          "></div>
        </div>
      </div>
      <style>
        @keyframes preloaderSlide {
          from { transform: translateX(-8px); }
          to   { transform: translateX(8px); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/ExpenseTracker/sw.js')
            .then(r => console.log('[SW] Registered:', r.scope))
            .catch(e => console.warn('[SW] Registration failed:', e));
        });
      }
    </script>
  </body>
</html>
