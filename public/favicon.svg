<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Bar chart bars (4 bars, ascending) -->
  <rect x="8"  y="46" width="9" height="11" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="19" y="38" width="9" height="19" rx="2" fill="rgba(255,255,255,0.6)"/>
  <rect x="30" y="28" width="9" height="29" rx="2" fill="rgba(255,255,255,0.85)"/>
  <rect x="41" y="33" width="9" height="24" rx="2" fill="rgba(255,255,255,0.65)"/>

  <!-- Trend line -->
  <polyline
    points="12,46 23,38 34,28 45.5,20"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Peak dot -->
  <circle cx="45.5" cy="20" r="3.5" fill="white"/>

  <!-- ₹ symbol top-left -->
  <text
    x="8" y="19"
    font-family="system-ui,-apple-system,Arial,sans-serif"
    font-size="13"
    font-weight="800"
    fill="rgba(255,255,255,0.9)"
  >₹</text>
</svg>